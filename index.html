<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wind Suite — ASCE 7 Wind Load Calculator</title>
    <!-- Tailwind CSS (required for Wind Calculator UI) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet CSS (required for WSS map picker) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- IBM Plex Sans + Mono (Structural Suite theme) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700;800&display=swap" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; }
      /* warm vellum desk ruled in faint blueprint blue (§4a) */
      body {
        background-color: #EFEDE6;
        background-image:
          linear-gradient(rgba(35,87,127,.12) 1px, transparent 1px),
          linear-gradient(90deg, rgba(35,87,127,.12) 1px, transparent 1px),
          linear-gradient(rgba(35,87,127,.06) 1px, transparent 1px),
          linear-gradient(90deg, rgba(35,87,127,.06) 1px, transparent 1px);
        background-size: 110px 110px, 110px 110px, 22px 22px, 22px 22px;
        font-family: 'IBM Plex Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
        color: #1C2733;
      }
      @media print { body { background-image: none !important; background-color: #FFFFFF !important; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- Leaflet JS (must load before app) -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
